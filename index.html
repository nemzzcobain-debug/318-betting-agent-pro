    [/tennis_wta/,{sport:"tennis",league:"WTA Tour",country:"\u{1F30D}",icon:"\u{1F3BE}"}],
    [/basketball_nba/,{sport:"basketball",league:"NBA",country:"\u{1F1FA}\u{1F1F8}",icon:"\u{1F3C0}"}],
    [/basketball_euro/,{sport:"basketball",league:"EuroLeague",country:"\u{1F1EA}\u{1F1FA}",icon:"\u{1F3C0}"}],
    [/soccer_uefa_europa/,{sport:"football",league:"Europa League",country:"\u{1F1EA}\u{1F1FA}",icon:"\u26BD"}],
    [/rugby/,{sport:"rugby",league:"Rugby",country:"\u{1F30D}",icon:"\u{1F3C9}"}],
  ];
  const f=map.find(([re])=>re.test(key));
  return f?f[1]:{sport:"other",league:key,country:"\u{1F30D}",icon:"\u{1F3C5}"};
};

const calcConfidence=(homeOdds,awayOdds,drawOdds)=>{
  const ip=1/homeOdds;
  const margin=drawOdds?(1/homeOdds+1/drawOdds+1/awayOdds-1):(1/homeOdds+1/awayOdds-1);
  const tp=ip/(1+margin);
  return Math.min(99,Math.round(tp*1000)/10);
};

const kellyStake=(prob,odds,bank,edge)=>{
  /* If true value bet (edge>0), use fractional Kelly (25%) capped at 5% */
  const b=odds-1,q=1-prob;
  const k=(prob*b-q)/b;
  if(k>0)return Math.min(k*0.25*bank,bank*0.05);
  /* Near-value or high-conf: suggest conservative flat bet (1-2% of bank) */
  if(edge!==undefined&&edge>-3&&prob>0.6)return Math.round(bank*0.01*100)/100;
  return 0;
};

const DateUtils={
  toKey(d){const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`},
  toLabel(dk){
    const t=new Date();t.setHours(0,0,0,0);
    const tm=new Date(t);tm.setDate(tm.getDate()+1);
    if(DateUtils.toKey(t)===dk)return"Aujourd'hui";
    if(DateUtils.toKey(tm)===dk)return"Demain";
    return new Date(dk+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  },
  toTime(d){return new Date(d).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})},
  groupByDay(matches){
    const g={};
    matches.forEach(m=>{const k=m.commence?DateUtils.toKey(m.commence):"inconnu";if(!g[k])g[k]=[];g[k].push(m)});
    return Object.entries(g).sort(([a],[b])=>a.localeCompare(b)).map(([k,ms])=>({dateKey:k,label:DateUtils.toLabel(k),matches:ms.sort((a,b)=>new Date(a.commence||0)-new Date(b.commence||0))}));
  }
};

const fetchOdds=async(apiKey)=>{
  const results=[];
  let quotaExhausted=false;
  for(const sport of API_CONFIG.oddsApi.sports){
    if(quotaExhausted)break;
    try{
      const r=await fetch(`${API_CONFIG.oddsApi.baseUrl}/sports/${sport}/odds/?apiKey=${apiKey}&regions=eu,uk,us,au&markets=h2h&oddsFormat=decimal`);
      if(r.ok){
        const d=await r.json();
        if(d&&d.error_code==="OUT_OF_USAGE_CREDITS"){quotaExhausted=true;break;}
        if(Array.isArray(d))results.push(...d.map(g=>({...g,sportKey:sport})));
      }
      await new Promise(resolve=>setTimeout(resolve,200));
    }catch(e){console.warn(`[Odds] ${sport}:`,e.message);}
  }
  return{data:results,quotaExhausted};
};

const fetchFootballLeague=async(apiKey,leagueId)=>{
  const h={"x-apisports-key":apiKey};
  try{
    const[fx,st,inj]=await Promise.all([
      fetch(`${API_CONFIG.football.baseUrl}/fixtures?league=${leagueId}&season=${SEASON}&next=10`,{headers:h}).then(r=>r.json()),
      fetch(`${API_CONFIG.football.baseUrl}/standings?league=${leagueId}&season=${SEASON}`,{headers:h}).then(r=>r.json()),
      fetch(`${API_CONFIG.football.baseUrl}/injuries?league=${leagueId}&season=${SEASON}`,{headers:h}).then(r=>r.json()),
    ]);
    return{fixtures:fx.response||[],standings:st.response||[],injuries:inj.response||[]};
  }catch(e){console.warn(`[Football] league ${leagueId}:`,e.message);return{fixtures:[],standings:[],injuries:[]};}
};

const fetchAllFootball=async(apiKey)=>{
  const r={};
  for(const[n,id]of Object.entries(API_CONFIG.football.leagues))r[n]=await fetchFootballLeague(apiKey,id);
  return r;
};

const oddsToMatches=(oddsData)=>{
  return oddsData.map((game,i)=>{
    const info=sportKeyToName(game.sportKey);
    const bks=game.bookmakers||[];
    if(bks.length===0||!bks[0]?.markets?.[0])return null;

    /* --- Scan ALL bookmakers to find best odds per outcome --- */
    let bestHome=0,bestAway=0,bestDraw=null,bestHomeBk="",bestAwayBk="",bestDrawBk="";
    const allHome=[],allAway=[],allDraw=[];
    bks.forEach(bk=>{
      const oc=bk.markets[0]?.outcomes||[];
      const ho=oc.find(o=>o.name===game.home_team);
      const ao=oc.find(o=>o.name===game.away_team);
      const dr=oc.find(o=>o.name==="Draw");
      if(ho){allHome.push(ho.price);if(ho.price>bestHome){bestHome=ho.price;bestHomeBk=bk.title||bk.key}}
      if(ao){allAway.push(ao.price);if(ao.price>bestAway){bestAway=ao.price;bestAwayBk=bk.title||bk.key}}
      if(dr){allDraw.push(dr.price);if(!bestDraw||dr.price>bestDraw){bestDraw=dr.price;bestDrawBk=bk.title||bk.key}}
    });
    if(bestHome===0||bestAway===0)return null;

    /* --- Compute consensus (median) odds for true probability --- */
    const median=arr=>{const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2};
    const medH=median(allHome),medA=median(allAway),medD=allDraw.length>0?median(allDraw):null;

    /* --- True probability from consensus (margin-removed) --- */
    const margin=medD?(1/medH+1/medD+1/medA-1):(1/medH+1/medA-1);
    const trueProbH=(1/medH)/(1+margin),trueProbA=(1/medA)/(1+margin);

    /* --- Value = best available odds vs true probability (incl draw) --- */
    const valueH=trueProbH*bestHome-1,valueA=trueProbA*bestAway-1;
    let valueD=-999;
    let trueProbD=0;
    if(medD&&bestDraw){trueProbD=(1/medD)/(1+margin);valueD=trueProbD*bestDraw-1;}
    const vals=[{v:valueH,p:trueProbH,o:bestHome,bk:bestHomeBk,pred:`${game.home_team} Victoire`,bt:"Victoire domicile"},{v:valueA,p:trueProbA,o:bestAway,bk:bestAwayBk,pred:`${game.away_team} Victoire`,bt:"Victoire exterieur"}];
    if(medD&&bestDraw)vals.push({v:valueD,p:trueProbD,o:bestDraw,bk:bestDrawBk,pred:"Match Nul",bt:"Nul"});
    vals.sort((a,b)=>b.v-a.v);
    const best=vals[0];
    const conf=Math.min(99,Math.round(best.p*1000)/10);
    const edge=Math.round(best.v*1000)/10;

    if(conf<MIN_CONFIDENCE)return null;

    return{
      id:1000+i,...info,
      home:game.home_team,away:game.away_team,confidence:conf,
      prediction:best.pred,
      betType:best.bt,
      bestOdds:best.o,bestBk:best.bk,edge,
      isValue:edge>0,nearValue:edge>-3&&edge<=0,
      odds:bestDraw?{home:bestHome,draw:bestDraw,away:bestAway}:{home:bestHome,away:bestAway},
      homeForm:["?","?","?","?","?"],awayForm:["?","?","?","?","?"],
      h2h:"Consultez les stats pour les confrontations directes",
      tactics:{home:"Analyse tactique via API-Football",away:"Analyse tactique via API-Football"},
      injuries:{home:["Chargement..."],away:["Chargement..."]},
      pitch:"Stade officiel",weather:"Conditions actuelles",
      motivation:`${game.home_team} vs ${game.away_team}`,
      keyStats:[
        `Meilleure cote: ${best.o} (${best.bk})`,
        `Edge: ${edge>0?"+":""}${edge}%`,
        `Prob. reelle: ${conf}%`,
        `Cotes dom: ${Math.min(...allHome).toFixed(2)}-${bestHome.toFixed(2)} (${allHome.length} bk)`,
        `Cotes ext: ${Math.min(...allAway).toFixed(2)}-${bestAway.toFixed(2)} (${allAway.length} bk)`,
        bestDraw?`Cote nul: ${bestDraw.toFixed(2)} (${bestDrawBk})`:"Match sans nul",
        `${bks.length} bookmakers compares`
      ],
      xg:null,goalsAvg:null,live:true,commence:game.commence_time
    };
  }).filter(Boolean).sort((a,b)=>(b.edge||0)-(a.edge||0));
};

const enrichWithFootball=(matches,fd)=>{
  if(!fd)return matches;
  return matches.map(m=>{
    if(m.sport!=="football")return m;
    for(const[,data]of Object.entries(fd)){
      if(!data.fixtures)continue;
      for(const fix of data.fixtures){
        const hw=m.home.toLowerCase().split(" ")[0],aw=m.away.toLowerCase().split(" ")[0];
        if(fix.teams?.home?.name?.toLowerCase().includes(hw)||fix.teams?.away?.name?.toLowerCase().includes(aw)){
          const stArr=data.standings?.[0]?.league?.standings?.[0]||[];
          const hs=stArr.find(s=>s.team?.name?.toLowerCase().includes(hw));
          const as=stArr.find(s=>s.team?.name?.toLowerCase().includes(aw));
          const fm={W:"V",D:"N",L:"D"};
          const pf=r=>r?.split("").slice(-5).map(c=>fm[c]||"?")||["?","?","?","?","?"];
          const injF=w=>data.injuries?.filter(inj=>inj.team?.name?.toLowerCase().includes(w)).map(inj=>`${inj.player?.name} (${inj.player?.reason})`).slice(0,3)||[];
          const hi=injF(hw),ai=injF(aw);
          return{...m,homeForm:pf(hs?.form),awayForm:pf(as?.form),
            injuries:{home:hi.length>0?hi:["Aucune blessure signalee"],away:ai.length>0?ai:["Aucune blessure signalee"]},
            keyStats:[...m.keyStats.slice(0,2),
              hs?`${m.home}: ${hs.rank}e - ${hs.points}pts`:"",
              as?`${m.away}: ${as.rank}e - ${as.points}pts`:"",
              hs?`Bilan dom. ${m.home}: ${hs.home?.win||"?"}V-${hs.home?.draw||"?"}N-${hs.home?.lose||"?"}D`:"",
              as?`Bilan ext. ${m.away}: ${as.away?.win||"?"}V-${as.away?.draw||"?"}N-${as.away?.lose||"?"}D`:"",
            ].filter(Boolean)};
        }
      }
    }
    return m;
  });
};

const App=()=>{
  const[config,setConfig]=useState(()=>DB.getConfig());

  const[sportFilter,setSportFilter]=useState("all");
  const[notifOpen,setNotifOpen]=useState(false);
  const[notifsRead,setNotifsRead]=useState(false);
  const[matches,setMatches]=useState(()=>DB.getCache().matches||[]);
  const[loading,setLoading]=useState(false);
  const[lastRefresh,setLastRefresh]=useState(()=>{const c=DB.getCache();return c.ts?new Date(c.ts):null});
  const[apiStatus,setApiStatus]=useState({odds:null,football:null});
  const[fetchError,setFetchError]=useState(null);
  const[demoMode,setDemoMode]=useState(false);
  const cmdRef=useRef(null);

  /* ---- Chargement donnees live ---- */
  const configRef=useRef(config);
  configRef.current=config;

  const loadData=useCallback(async()=>{
    const cfg=configRef.current;
    if(!cfg)return;
    setLoading(true);setFetchError(null);
    const status={odds:null,football:null};
    try{
      let oddsMatches=[];
      let footballData=null;
      let usedDemo=false;
      if(cfg.oddsKey){
        try{
          const{data:raw,quotaExhausted}=await fetchOdds(cfg.oddsKey);
          if(quotaExhausted||raw.length===0){
            console.warn("[318] Quota API epuise ou aucune donnee — activation mode demo");
            const demoRaw=generateDemoData();
            oddsMatches=oddsToMatches(demoRaw);
            usedDemo=true;
            status.odds={ok:false,error:"Quota epuise — mode demo actif. Reset le 1er du mois."};
          }else{
            oddsMatches=oddsToMatches(raw);
            status.odds={ok:true,count:raw.length,filtered:oddsMatches.length};
          }
        }catch(e){
          console.warn("[318] Erreur API, fallback demo:",e.message);
          const demoRaw=generateDemoData();
          oddsMatches=oddsToMatches(demoRaw);
          usedDemo=true;
          status.odds={ok:false,error:e.message+" — mode demo actif"};
        }
      }else{
        const demoRaw=generateDemoData();
        oddsMatches=oddsToMatches(demoRaw);
        usedDemo=true;
        status.odds={ok:false,error:"Aucune cle API — mode demo"};
      }
      if(cfg.footballKey&&!usedDemo){
        try{
          footballData=await fetchAllFootball(cfg.footballKey);
          if(oddsMatches.length>0)oddsMatches=enrichWithFootball(oddsMatches,footballData);
          status.football={ok:true};
        }catch(e){status.football={ok:false,error:e.message};}
      }
      setDemoMode(usedDemo);
      setMatches(oddsMatches);
      if(!usedDemo)DB.saveCache(oddsMatches);
      setApiStatus(status);
      setLastRefresh(new Date());
    }catch(e){setFetchError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    if(!config)return;
    loadData();
    const iv=setInterval(loadData,(config.refreshInterval||5)*60*1000);
    return()=>clearInterval(iv);
  },[config]);

  /* ---- Donnees derivees (AVANT le return conditionnel pour respecter les regles des hooks) ---- */
  const sorted=useMemo(()=>[...matches].sort((a,b)=>b.confidence-a.confidence),[matches]);
  const top=sorted[0];
  const filtered=sportFilter==="all"?sorted:sorted.filter(m=>m.sport===sportFilter);
  const bySport=useMemo(()=>{const g={};sorted.forEach(m=>{if(!g[m.sport])g[m.sport]=[];g[m.sport].push(m)});return g},[sorted]);
  const valueBets=useMemo(()=>sorted.filter(m=>m.isValue),[sorted]);
  const nearValueBets=useMemo(()=>sorted.filter(m=>m.nearValue),[sorted]);
  const highConf=useMemo(()=>sorted.filter(m=>m.isValue||m.nearValue),[sorted]);
  /* Tiers de confiance pour le classement */
  const tierTop=useMemo(()=>sorted.filter(m=>m.confidence>=80),[sorted]);
  const tierHigh=useMemo(()=>sorted.filter(m=>m.confidence>=60&&m.confidence<80),[sorted]);
  const tierMid=useMemo(()=>sorted.filter(m=>m.confidence>=40&&m.confidence<60),[sorted]);
  const tierLow=useMemo(()=>sorted.filter(m=>m.confidence<40),[sorted]);

  /* ---- Setup screen ---- */
  if(!config)return <SetupScreen onComplete={setConfig}/>;

  /* ---- Actions ---- */
  const placeBet=(match)=>{
    const s=kellyStake(match.confidence/100,match.bestOdds,bankroll,match.edge);
    if(s<=0)return;
    const newBet={...match,stake:+s.toFixed(2),status:"pending",ts:Date.now()};
    const nb=[newBet,...bets];
    setBets(nb);DB.saveBets(nb);
    const newBank=+(bankroll-s).toFixed(2);
    setBankroll(newBank);
    const c=DB.getConfig();if(c){c.bankroll=newBank;DB.saveConfig(c);}
  };

  const closeBet=(idx,result)=>{
    const nb=[...bets];
    nb[idx]={...nb[idx],status:result};
    if(result==="won"){
      const gain=nb[idx].stake*((nb[idx].bestOdds||Object.values(nb[idx].odds)[0])-1);
      const newBank=+(bankroll+nb[idx].stake+gain).toFixed(2);
      setBankroll(newBank);
      const c=DB.getConfig();if(c){c.bankroll=newBank;DB.saveConfig(c);}
    }
    setBets(nb);DB.saveBets(nb);
  };

  const handleCmd=(input)=>{
    const l=(input||cmd).toLowerCase().trim();
    if(!l){setView("dashboard");return;}
    if(l.includes("pari")||l.includes("bet")||l.includes("miser")||l.includes("meilleur"))setView("bestbet");
    else if(l.includes("analyse")||l.includes("detail"))setView("analysis");
    else if(l.includes("bank")||l.includes("solde")||l.includes("argent"))setView("bankroll");
    else if(l.includes("strat")||l.includes("conseil")||l.includes("regle"))setView("strategy");
    else if(l.includes("risque")||l.includes("danger")||l.includes("perdre"))setView("risk");
    else if(l.includes("programme")||l.includes("calendrier")||l.includes("planning")||l.includes("jour")||l.includes("demain"))setView("programme");
    else if(l.includes("foot")||l.includes("soccer"))setView("sport-football");
    else if(l.includes("tennis"))setView("sport-tennis");
    else if(l.includes("basket")||l.includes("nba"))setView("sport-basketball");
    else if(l.includes("rugby"))setView("sport-rugby");
    else if(l.includes("sport")||l.includes("tous")||l.includes("liste"))setView("sports-all");
    else if(l.includes("notif")||l.includes("alert"))setView("notifications");
    else setView("dashboard");
  };
  const quickCmd=c=>{setCmd(c);handleCmd(c)};

  const updateConfig=nc=>{const m={...config,...nc};DB.saveConfig(m);setConfig(m);if(nc.bankroll!==undefined)setBankroll(nc.bankroll)};
  const logout=()=>{DB.resetAll();setConfig(null);setMatches([]);setTab("agent")};

  /* ═══════════════════════════════════════════════════════
     9 — SOUS-COMPOSANTS
     ═══════════════════════════════════════════════════════ */

  const Header=()=>(
    <header style={{background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#e50914,#b20710)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#fff"}}>318</div>
        <div><div style={{fontWeight:800,fontSize:16,letterSpacing:.5}}>318 BETTING AGENT</div><div style={{fontSize:10,color:"#e50914",fontWeight:600,letterSpacing:1}}>PARIS SPORTIFS PRO</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <div style={{display:"flex",alignItems:"center",gap:4,background:"#111",borderRadius:8,padding:"6px 12px"}}><span style={{color:"#e50914",fontWeight:700}}>&#x20AC;</span><span style={{fontWeight:800,fontSize:14}}>{bankroll.toFixed(2)}</span></div>
        <div style={{position:"relative",cursor:"pointer"}} onClick={()=>{setNotifOpen(!notifOpen);setNotifsRead(true)}}>
          <span style={{fontSize:20}}>&#x1F514;</span>
          {!notifsRead&&highConf.length>0&&<span className="pulse" style={{position:"absolute",top:-4,right:-4,background:"#e50914",color:"#fff",width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{highConf.length}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#46d369"}}><span style={{width:8,height:8,borderRadius:"50%",background:"#46d369",display:"inline-block"}} className="pulse"/>LIVE</div>
        {loading&&<div className="spinner"/>}
      </div>
    </header>
  );

  const Nav=()=>(
    <div style={{display:"flex",gap:0,background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"0 20px"}}>
      {[{id:"agent",label:"&#x1F3AF; Agent"},{id:"scanner",label:"&#x1F50D; Scanner"},{id:"tracker",label:"&#x1F4CA; Tracker"},{id:"profile",label:"&#x2699;&#xFE0F; Profil"}].map(t=>(
        <button key={t.id} onClick={()=>{setTab(t.id);setSelMatch(null)}} style={{padding:"12px 20px",background:"none",border:"none",borderBottom:tab===t.id?"2px solid #e50914":"2px solid transparent",color:tab===t.id?"#fff":"#808080",fontWeight:600,fontSize:13,cursor:"pointer",transition:"all .2s"}} dangerouslySetInnerHTML={{__html:t.label}}/>
      ))}
    </div>
  );

  const Notifs=()=>notifOpen?(
    <div className="fade-in" style={{position:"absolute",top:110,right:20,width:340,background:"#111",border:"1px solid rgba(229,9,20,.3)",borderRadius:12,zIndex:60,maxHeight:400,overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.8)"}}>
      <div style={{padding:12,borderBottom:"1px solid #222",fontWeight:700,fontSize:13}}>Alertes ({highConf.length})</div>
      {highConf.length===0&&<div style={{padding:24,textAlign:"center",color:"#555",fontSize:13}}>Aucune alerte</div>}
      {highConf.map(m=>(
        <div key={m.id} onClick={()=>{setSelMatch(m);setNotifOpen(false)}} style={{padding:12,borderBottom:"1px solid #1a1a1a",cursor:"pointer",borderLeft:"3px solid #e50914"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13}}>{m.icon} {m.home} vs {m.away}</span><ConfBadge v={m.confidence}/></div>
          <div style={{fontSize:10,color:"#666",marginTop:4}}>BET DETECTE - {m.league}</div>
        </div>
      ))}
    </div>
  ):null;

  const SmallCard=({m})=>{
    const stake=kellyStake(m.confidence/100,m.bestOdds,bankroll,m.edge);
    const hasEdge=m.isValue;
    const nearVal=m.nearValue;
    const bg=hasEdge?"#0a1a0a":nearVal?"#0f0f05":"#111";
    const bc=hasEdge?"rgba(70,211,105,.3)":nearVal?"rgba(245,197,24,.25)":"rgba(229,9,20,.15)";
    return(
    <div onClick={()=>setSelMatch(m)} style={{minWidth:260,flexShrink:0,background:bg,border:`1px solid ${bc}`,borderRadius:10,padding:16,cursor:"pointer",transition:"all .3s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.03)";e.currentTarget.style.boxShadow=hasEdge?"0 8px 24px rgba(70,211,105,.2)":nearVal?"0 8px 24px rgba(245,197,24,.15)":"0 8px 24px rgba(229,9,20,.2)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:20}}>{m.icon}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {hasEdge&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:8,background:"rgba(70,211,105,.2)",color:"#46d369",fontWeight:700}}>+{m.edge}% VALUE</span>}
          {nearVal&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:8,background:"rgba(245,197,24,.15)",color:"#f5c518",fontWeight:700}}>{m.edge}%</span>}
          <ConfBadge v={m.confidence}/>
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{m.home} vs {m.away}</div>
      <div style={{fontSize:11,color:"#808080",marginBottom:4}}>{m.country} {m.league}</div>
      {m.commence&&<div style={{fontSize:10,color:"#e50914"}}>{new Date(m.commence).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
        <div><span style={{fontSize:20,fontWeight:900,color:hasEdge?"#46d369":"#e50914"}}>{m.bestOdds}</span>{m.bestBk&&<span style={{fontSize:9,color:"#666",marginLeft:4}}>{m.bestBk}</span>}</div>
        <span style={{fontSize:11,color:stake>0?"#46d369":"#b3b3b3",fontWeight:stake>0?700:400}}>Mise: {stake.toFixed(2)}&#x20AC;</span>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px solid #1a1a1a"}}><FormBadges form={m.homeForm}/><FormBadges form={m.awayForm}/></div>
    </div>);
  };

  const HeroCard=({m})=>(
    <div onClick={()=>setSelMatch(m)} style={{background:"linear-gradient(135deg,rgba(229,9,20,.18),rgba(0,0,0,.95))",border:"2px solid rgba(229,9,20,.3)",borderRadius:14,padding:32,cursor:"pointer",position:"relative",overflow:"hidden",marginBottom:24}}
      onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(229,9,20,.6)"}
      onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(229,9,20,.3)"}>
      <div style={{position:"absolute",top:-80,right:-40,width:300,height:300,background:"radial-gradient(circle,rgba(229,9,20,.12),transparent 70%)",borderRadius:"50%"}}/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:10,color:"#e50914",fontWeight:700,textTransform:"uppercase",letterSpacing:2}}>Meilleur pari du moment</span>
          <span style={{fontSize:9,background:"rgba(70,211,105,.2)",color:"#46d369",padding:"2px 8px",borderRadius:10,fontWeight:700}}>LIVE</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:28}}>{m.icon}</span><span style={{fontSize:11,color:"#999"}}>{m.country} {m.league}</span><ConfBadge v={m.confidence}/></div>
            <h2 style={{fontSize:24,fontWeight:900,marginBottom:6}}>{m.home} <span style={{color:"#555"}}>vs</span> {m.away}</h2>
            <div style={{fontSize:14,color:"#e50914",fontWeight:600}}>{m.prediction}</div>
            {m.commence&&<div style={{fontSize:11,color:"#808080",marginTop:4}}>{new Date(m.commence).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})}</div>}
            <div style={{display:"flex",gap:16,marginTop:12}}>
              <div><span style={{fontSize:10,color:"#999"}}>Dom.</span><div style={{marginTop:4}}><FormBadges form={m.homeForm}/></div></div>
              <div><span style={{fontSize:10,color:"#999"}}>Ext.</span><div style={{marginTop:4}}><FormBadges form={m.awayForm}/></div></div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:42,fontWeight:900,color:"#e50914"}}>{m.confidence}%</div>
            <div style={{fontSize:11,color:"#999"}}>Confiance</div>
            <div style={{marginTop:8,fontSize:13}}>Cote: <strong>{m.bestOdds}</strong></div>
            <div style={{fontSize:13,color:"#b3b3b3"}}>Mise: <strong style={{color:"#fff"}}>{kellyStake(m.confidence/100,m.bestOdds,bankroll,m.edge).toFixed(2)}&#x20AC;</strong></div>
            <button onClick={e=>{e.stopPropagation();setSelMatch(m)}} style={{marginTop:12,padding:"10px 24px",background:"#e50914",border:"none",color:"#fff",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>Voir l'analyse &#x2192;</button>
          </div>
        </div>
      </div>
    </div>
  );

  const LiveBanner=()=>(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:demoMode?"rgba(245,197,24,.1)":matches.length>0?"rgba(70,211,105,.1)":"rgba(245,197,24,.1)",border:`1px solid ${demoMode?"rgba(245,197,24,.3)":matches.length>0?"rgba(70,211,105,.3)":"rgba(245,197,24,.3)"}`,borderRadius:demoMode?"10px 10px 0 0":10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:10,height:10,borderRadius:"50%",background:demoMode?"#f5c518":matches.length>0?"#46d369":"#f5c518"}} className="pulse"/>
          <span style={{fontSize:12,color:demoMode?"#f5c518":matches.length>0?"#46d369":"#f5c518",fontWeight:600}}>
            {demoMode?`MODE DEMO — ${matches.length} matchs simules`:matches.length>0?`LIVE — ${matches.length} matchs detectes`:"Chargement des matchs..."}
          </span>
          {lastRefresh&&<span style={{fontSize:10,color:"#808080"}}>MAJ: {lastRefresh.toLocaleTimeString("fr-FR")}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={loadData} disabled={loading} style={{fontSize:10,color:"#e50914",background:"rgba(229,9,20,.1)",border:"1px solid rgba(229,9,20,.3)",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>
            {loading?"...":"Refresh"}
          </button>
          <span style={{fontSize:10,color:"#808080"}}>Auto: {config.refreshInterval||5}min</span>
        </div>
      </div>
      {demoMode&&<div style={{padding:"8px 16px",background:"rgba(245,197,24,.05)",border:"1px solid rgba(245,197,24,.2)",borderTop:"none",borderRadius:"0 0 10px 10px",fontSize:11,color:"#f5c518",lineHeight:1.5}}>
        Quota API epuise (reset le 1er du mois). Les donnees affichees sont des simulations realistes pour demonstrer le classement et les fonctionnalites. Les cotes et matchs sont fictifs.
      </div>}
    </div>
  );

  /* Empty state quand pas de matchs */
  const EmptyState=({icon,title,text})=>(
    <div style={{textAlign:"center",padding:60}}>
      <div style={{fontSize:48,marginBottom:16}}>{icon}</div>
      <h3 style={{fontSize:18,fontWeight:800,marginBottom:8}}>{title}</h3>
      <p style={{color:"#808080",fontSize:13,lineHeight:1.6,maxWidth:400,margin:"0 auto"}}>{text}</p>
    </div>
  );

  /* ═══════════════════════════════════════════════════════
     10 — VUES
     ═══════════════════════════════════════════════════════ */

  const AgentView=()=>(
    <div className="fade-in" style={{padding:20,maxWidth:900,margin:"0 auto"}}>
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",gap:8}}>
          <input ref={cmdRef} value={cmd} onChange={e=>setCmd(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleCmd()}}
            placeholder="Tape une commande : programme, meilleur pari, analyse..."
            style={{flex:1,background:"#111",border:"1px solid rgba(229,9,20,.3)",borderRadius:10,padding:"14px 18px",color:"#fff",fontSize:14}}/>
          <button onClick={()=>handleCmd()} style={{padding:"14px 20px",background:"#e50914",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>&#x2192;</button>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {["Programme","Meilleur Pari","Analyse","Ma Bankroll","Strategie","Risques","Tous les sports"].map(c=>(
            <button key={c} onClick={()=>quickCmd(c)} style={{padding:"6px 14px",background:"#161616",border:"1px solid #222",borderRadius:20,color:"#b3b3b3",fontSize:11,fontWeight:500,cursor:"pointer",transition:"all .2s"}}
              onMouseEnter={e=>{e.target.style.borderColor="#e50914";e.target.style.color="#fff"}}
              onMouseLeave={e=>{e.target.style.borderColor="#222";e.target.style.color="#b3b3b3"}}>{c}</button>
          ))}
        </div>
      </div>

      {/* Dashboard */}
      {view==="dashboard"&&<div className="fade-in">
        <LiveBanner/>
        {sorted.length===0?<EmptyState icon="&#x1F4E1;" title="En attente de donnees" text="Les donnees sont actualisees automatiquement. Les matchs apparaitront des que l'API renvoie des cotes."/>:(
          <div>
            {/* Stats rapides */}
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:24}}>
              <div style={{background:"#111",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#888"}}>Total matchs</div><div style={{fontSize:28,fontWeight:900,color:"#e50914"}}>{sorted.length}</div></div>
              <div style={{background:"#0a1a0a",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center",border:"1px solid rgba(70,211,105,.2)"}}><div style={{fontSize:10,color:"#46d369"}}>VALUE BETS</div><div style={{fontSize:28,fontWeight:900,color:"#46d369"}}>{valueBets.length}</div></div>
              <div style={{background:"#111",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#ff6b6b"}}>80%+</div><div style={{fontSize:28,fontWeight:900,color:"#ff6b6b"}}>{tierTop.length}</div></div>
              <div style={{background:"#111",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#f5c518"}}>60-79%</div><div style={{fontSize:28,fontWeight:900,color:"#f5c518"}}>{tierHigh.length}</div></div>
              <div style={{background:"#111",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#4a90d9"}}>40-59%</div><div style={{fontSize:28,fontWeight:900,color:"#4a90d9"}}>{tierMid.length}</div></div>
              <div style={{background:"#111",borderRadius:10,padding:"12px 20px",flex:1,minWidth:120,textAlign:"center"}}><div style={{fontSize:10,color:"#888"}}>-40%</div><div style={{fontSize:28,fontWeight:900,color:"#888"}}>{tierLow.length}</div></div>
            </div>

            {/* Meilleur pari du moment */}
            <HeroCard m={top}/>

            {/* CLASSEMENT TOP POURCENTAGES */}
            <div style={{marginBottom:32}}>
              <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Classement par confiance</h3>
              <p style={{fontSize:12,color:"#888",marginBottom:16}}>{sorted.length} matchs tries du meilleur au moins bon</p>
              <div style={{background:"#0a0a0a",borderRadius:14,border:"1px solid #1a1a1a",overflow:"hidden"}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:"40px 1fr 80px 80px 80px 90px",gap:8,padding:"12px 16px",borderBottom:"1px solid #222",fontSize:10,color:"#666",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>
                  <span>#</span><span>Match</span><span style={{textAlign:"center"}}>Conf.</span><span style={{textAlign:"center"}}>Cote</span><span style={{textAlign:"center"}}>Edge</span><span style={{textAlign:"right"}}>Mise</span>
                </div>
                {/* Rows */}
                {sorted.map((m,i)=>{
                  const stake=kellyStake(m.confidence/100,m.bestOdds,bankroll,m.edge);
                  const tierColor=m.confidence>=80?"#ff6b6b":m.confidence>=60?"#f5c518":m.confidence>=40?"#4a90d9":"#555";
                  return(
                    <div key={m.id} onClick={()=>setSelMatch(m)} style={{display:"grid",gridTemplateColumns:"40px 1fr 80px 80px 80px 90px",gap:8,padding:"10px 16px",borderBottom:"1px solid #111",cursor:"pointer",background:m.isValue?"rgba(70,211,105,.05)":i%2===0?"transparent":"rgba(255,255,255,.01)",transition:"background .2s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(229,9,20,.08)"}
                      onMouseLeave={e=>e.currentTarget.style.background=m.isValue?"rgba(70,211,105,.05)":i%2===0?"transparent":"rgba(255,255,255,.01)"}>
                      <span style={{fontWeight:900,fontSize:16,color:i<3?"#e50914":tierColor}}>{i+1}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:13}}>{m.icon} {m.home} vs {m.away}</div>
                        <div style={{fontSize:10,color:"#666"}}>{m.country} {m.league} {m.commence?`• ${new Date(m.commence).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}`:""}</div>
                      </div>
                      <div style={{textAlign:"center"}}><span style={{padding:"3px 8px",borderRadius:12,fontSize:12,fontWeight:800,background:`${tierColor}22`,color:tierColor}}>{m.confidence}%</span></div>
                      <div style={{textAlign:"center",fontWeight:700,fontSize:14,color:"#fff"}}>{m.bestOdds.toFixed(2)}<div style={{fontSize:9,color:"#555",fontWeight:400}}>{m.bestBk}</div></div>
                      <div style={{textAlign:"center"}}>{m.isValue?<span style={{color:"#46d369",fontWeight:700,fontSize:12}}>+{m.edge}%</span>:m.nearValue?<span style={{color:"#f5c518",fontSize:12}}>{m.edge}%</span>:<span style={{color:"#555",fontSize:12}}>{m.edge}%</span>}</div>
                      <div style={{textAlign:"right",fontWeight:700,fontSize:13,color:stake>0?"#46d369":"#555"}}>{stake.toFixed(2)}&#x20AC;</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Value bets highlight */}
            {valueBets.length>0&&<div style={{marginBottom:24}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:8,color:"#46d369"}}>VALUE BETS ({valueBets.length})</h3>
              <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:16}}>{valueBets.map(m=><SmallCard key={m.id} m={m}/>)}</div></div>}

            {/* Par sport */}
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:12,color:"#e50914"}}>Par sport</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
              {[{s:"football",i:"\u26BD",n:"Football"},{s:"tennis",i:"\u{1F3BE}",n:"Tennis"},{s:"basketball",i:"\u{1F3C0}",n:"Basketball"},{s:"rugby",i:"\u{1F3C9}",n:"Rugby"}].map(({s,i,n})=>(
                <div key={s} onClick={()=>quickCmd(s)} style={{background:"#111",border:"1px solid rgba(229,9,20,.15)",borderRadius:10,padding:20,cursor:"pointer",textAlign:"center",transition:"all .3s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(229,9,20,.4)";e.currentTarget.style.transform="scale(1.03)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(229,9,20,.15)";e.currentTarget.style.transform="scale(1)"}}>
                  <div style={{fontSize:32,marginBottom:8}}>{i}</div><div style={{fontWeight:700,fontSize:14}}>{n}</div>
                  <div style={{fontSize:12,color:"#e50914",marginTop:4}}>{(bySport[s]||[]).length} matchs</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>}

      {/* Best bet */}
      {view==="bestbet"&&(top?<div className="fade-in"><h3 style={{fontSize:18,fontWeight:800,marginBottom:16}}>Meilleure opportunite</h3><HeroCard m={top}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>{top.keyStats.map((s,i)=><div key={i} style={{background:"#111",border:"1px solid rgba(229,9,20,.15)",borderRadius:8,padding:14}}><span style={{color:"#e50914",marginRight:8}}>&#x2713;</span><span style={{fontSize:13,color:"#ccc"}}>{s}</span></div>)}</div>
      </div>:<EmptyState icon="&#x1F3AF;" title="Aucun pari detecte" text="Attends le prochain rafraichissement des donnees."/>)}

      {/* Analysis */}
      {view==="analysis"&&(top?<div className="fade-in"><h3 style={{fontSize:18,fontWeight:800,marginBottom:16}}>Analyse - {top.home} vs {top.away}</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
          <div style={{background:"#111",borderRadius:10,padding:16,border:"1px solid rgba(229,9,20,.15)"}}><h4 style={{fontSize:13,fontWeight:700,color:"#e50914",marginBottom:10}}>Forme</h4><div style={{marginBottom:8}}><span style={{fontSize:11,color:"#999"}}>{top.home}:</span> <FormBadges form={top.homeForm}/></div><div><span style={{fontSize:11,color:"#999"}}>{top.away}:</span> <FormBadges form={top.awayForm}/></div></div>
          <div style={{background:"#111",borderRadius:10,padding:16,border:"1px solid rgba(229,9,20,.15)"}}><h4 style={{fontSize:13,fontWeight:700,color:"#e50914",marginBottom:10}}>Confrontations</h4><p style={{fontSize:13,color:"#ccc"}}>{top.h2h}</p></div>

          ))}
        </div>
      </div>}

      {/* Programme par jour */}
      {view==="programme"&&(()=>{
        const days=DateUtils.groupByDay(sorted);
        return(<div className="fade-in">
          <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Programme des matchs</h3>

                <div style={{fontSize:12,color:"#808080"}}>{day.matches.length} match{day.matches.length>1?"s":""}</div>
                <div style={{flex:1,height:1,background:"#222"}}/>

                <div key={m.id} onClick={()=>setSelMatch(m)} style={{display:"flex",alignItems:"center",gap:16,padding:"14px 16px",background:"#111",borderRadius:10,marginBottom:8,cursor:"pointer",border:"1px solid rgba(229,9,20,.1)",transition:"all .2s"}}

                  <div style={{minWidth:50,textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:"#e50914"}}>{m.commence?DateUtils.toTime(m.commence):"--:--"}</div></div>

                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{fontSize:16}}>{m.icon}</span><span style={{fontWeight:700,fontSize:14}}>{m.home}</span><span style={{color:"#555",fontSize:12}}>vs</span><span style={{fontWeight:700,fontSize:14}}>{m.away}</span></div>
                    <div style={{fontSize:11,color:"#808080"}}>{m.country} {m.league} - {m.prediction}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}><ConfBadge v={m.confidence}/><div style={{fontSize:11,color:"#b3b3b3",marginTop:4}}>Cote {m.bestOdds}</div></div>
                </div>
              ))}
            </div>
          ))}
        </div>);
      })()}

      {/* Sport filter */}
      {view.startsWith("sport-")&&(()=>{

        return(<div className="fade-in"><h3 style={{fontSize:18,fontWeight:800,marginBottom:16}}>{sn[s]} - {ms.length} opportunites</h3>

      {view==="sports-all"&&<div className="fade-in"><h3 style={{fontSize:18,fontWeight:800,marginBottom:16}}>Tous les sports</h3>

            <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>{ms.map(m=><SmallCard key={m.id} m={m}/>)}</div>

      {/* Notifications */}
      {view==="notifications"&&<div className="fade-in"><h3 style={{fontSize:18,fontWeight:800,marginBottom:16}}>Opportunites detectees</h3>
        <p style={{fontSize:13,color:"#b3b3b3",marginBottom:16}}>{valueBets.length} value bets + {nearValueBets.length} near-value</p>
        {highConf.map(m=>(
          <div key={m.id} onClick={()=>setSelMatch(m)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:16,background:"#111",borderRadius:10,marginBottom:8,borderLeft:`3px solid ${m.isValue?"#46d369":m.nearValue?"#f5c518":"#e50914"}`,cursor:"pointer"}}>
            <div><span style={{fontSize:16,marginRight:8}}>{m.icon}</span><span style={{fontWeight:700,fontSize:14}}>{m.home} vs {m.away}</span><span style={{fontSize:11,color:"#808080",marginLeft:8}}>{m.league}</span>{m.isValue&&<span style={{fontSize:9,marginLeft:6,padding:"2px 6px",borderRadius:8,background:"rgba(70,211,105,.2)",color:"#46d369",fontWeight:700}}>+{m.edge}%</span>}{m.nearValue&&<span style={{fontSize:9,marginLeft:6,padding:"2px 6px",borderRadius:8,background:"rgba(245,197,24,.15)",color:"#f5c518",fontWeight:700}}>{m.edge}%</span>}</div>
            <ConfBadge v={m.confidence}/>
          </div>
        ))}
        {highConf.length===0&&<EmptyState icon="&#x1F514;" title="Aucun value bet" text="Les alertes apparaissent quand un match a un edge positif ou proche de zero."/>}
      </div>}
    </div>
  );

  /* Scanner */
  const ScannerView=()=>(
    <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>
      <LiveBanner/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div><h2 style={{fontWeight:800,fontSize:18}}>Scanner Value Bets</h2><p style={{fontSize:12,color:"#808080"}}>{filtered.length} opportunites en temps reel</p></div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[{id:"all",l:"Tous"},{id:"football",l:"\u26BD"},{id:"tennis",l:"\u{1F3BE}"},{id:"basketball",l:"\u{1F3C0}"},{id:"rugby",l:"\u{1F3C9}"}].map(f=>(
            <button key={f.id} onClick={()=>setSportFilter(f.id)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,border:"1px solid",cursor:"pointer",background:sportFilter===f.id?"rgba(229,9,20,.2)":"#111",color:sportFilter===f.id?"#ff4444":"#808080",borderColor:sportFilter===f.id?"rgba(229,9,20,.4)":"#222"}}>{f.l}</button>
          ))}

      {filtered.length>0&&<HeroCard m={filtered[0]}/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:12}}>{filtered.slice(1).map(m=><SmallCard key={m.id} m={m}/>)}</div>

    </div>

  /* Tracker */
  const TrackerView=()=>(
    <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Bankroll actuelle</div>
        <div style={{fontSize:52,fontWeight:900}}>{bankroll.toFixed(2)}&#x20AC;</div>
        <div style={{fontSize:14,color:bankroll>=100?"#46d369":"#e50914",fontWeight:600}}>ROI: {((bankroll-100)/100*100).toFixed(1)}%</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        {[{l:"Capital",v:bankroll.toFixed(2)+"\u20AC",c:"#e50914"},{l:"Paris actifs",v:bets.filter(b=>b.status==="pending").length,c:"#f5c518"},{l:"Total paris",v:bets.length,c:"#b3b3b3"},{l:"Matchs live",v:sorted.length,c:"#46d369"}].map((s,i)=>(
          <div key={i} style={{background:"#111",borderRadius:10,padding:16,textAlign:"center",border:"1px solid rgba(229,9,20,.15)"}}><div style={{fontSize:10,color:"#999",marginBottom:4,textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div></div>
        ))}
      </div>
      <div style={{background:"#111",borderRadius:10,padding:16,border:"1px solid rgba(229,9,20,.15)",marginBottom:16}}>
        <h4 style={{fontWeight:700,fontSize:14,marginBottom:12}}>Historique des paris</h4>
        {bets.length===0?<EmptyState icon="&#x1F3AF;" title="Aucun pari" text="Place ton premier pari depuis l'Agent ou le Scanner !"/>:bets.map((b,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:12,borderBottom:"1px solid #1a1a1a",borderLeft:`3px solid ${b.status==="won"?"#46d369":b.status==="lost"?"#e50914":"#f5c518"}`}}>
            <div><span>{b.icon} </span><strong style={{fontSize:13}}>{b.home} vs {b.away}</strong><span style={{fontSize:11,color:"#999",marginLeft:8}}>{b.prediction}</span>
              <span style={{marginLeft:8,fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600,background:b.status==="pending"?"rgba(245,197,24,.2)":b.status==="won"?"rgba(70,211,105,.2)":"rgba(229,9,20,.2)",color:b.status==="pending"?"#f5c518":b.status==="won"?"#46d369":"#e50914"}}>{b.status==="pending"?"EN COURS":b.status==="won"?"\u2713 GAGNE":"\u2717 PERDU"}</span>

  /* Profil */
  const ProfileView=()=>{
    const[eOK,setEOK]=useState(config.oddsKey||"");
    const[eFK,setEFK]=useState(config.footballKey||"");
    const[eBR,setEBR]=useState(bankroll);
    const[eRI,setERI]=useState(config.refreshInterval||5);
    const[saved,setSaved]=useState(false);
    const[tO,setTO]=useState(false);const[tF,setTF]=useState(false);
    const[rO,setRO]=useState(null);const[rF,setRF]=useState(null);

    const save=()=>{updateConfig({oddsKey:eOK.trim(),footballKey:eFK.trim(),bankroll:eBR,refreshInterval:eRI});setBankroll(eBR);setSaved(true);setTimeout(()=>setSaved(false),2000)};
    const testOdds=async()=>{if(!eOK.trim())return;setTO(true);setRO(null);try{const r=await fetch(`${API_CONFIG.oddsApi.baseUrl}/sports/?apiKey=${eOK.trim()}`);if(r.ok){const d=await r.json();setRO({ok:true,msg:`Connecte ! ${d.length} sports.`})}else{const e=await r.json().catch(()=>({}));setRO({ok:false,msg:e.message||`Erreur ${r.status}`})}}catch(e){setRO({ok:false,msg:e.message})}finally{setTO(false)}};
    const testFB=async()=>{if(!eFK.trim())return;setTF(true);setRF(null);try{const r=await fetch(`${API_CONFIG.football.baseUrl}/status`,{headers:{"x-apisports-key":eFK.trim()}});if(r.ok){const d=await r.json();const a=d.response?.account,rq=d.response?.requests;setRF({ok:true,msg:a?`Connecte ! ${rq?.current||0}/${rq?.limit_day||100} req`:"Connecte !"})}else{setRF({ok:false,msg:`Erreur ${r.status}`})}}catch(e){setRF({ok:false,msg:e.message})}finally{setTF(false)}};

    return(
      <div className="fade-in" style={{padding:20,maxWidth:700,margin:"0 auto"}}>
        <h2 style={{fontSize:22,fontWeight:900,marginBottom:4}}>Profil et Reglages</h2>
        <p style={{fontSize:13,color:"#808080",marginBottom:24}}>Gere tes cles API, ta bankroll et tes preferences.</p>

        <ProfileCard title="Cles API" icon="&#x1F511;" accent>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,color:"#e50914",fontWeight:700,letterSpacing:1,display:"block",marginBottom:6}}>THE ODDS API</label>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={eOK} onChange={e=>setEOK(e.target.value)} placeholder="Cle API..." style={{flex:1,padding:"12px 14px",background:"#0a0a0a",border:"1px solid rgba(229,9,20,.3)",borderRadius:8,color:"#fff",fontSize:13}}/>
              <button onClick={testOdds} disabled={!eOK.trim()||tO} style={{padding:"12px 16px",background:"rgba(229,9,20,.15)",border:"1px solid rgba(229,9,20,.3)",borderRadius:8,color:"#e50914",fontWeight:700,fontSize:12,cursor:eOK.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>{tO?"...":"Tester"}</button>
            </div>
            {rO&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:6,fontSize:11,fontWeight:600,background:rO.ok?"rgba(70,211,105,.1)":"rgba(229,9,20,.1)",color:rO.ok?"#46d369":"#e50914",border:`1px solid ${rO.ok?"rgba(70,211,105,.3)":"rgba(229,9,20,.3)"}`}}>{rO.ok?"\u2713 ":"\u2717 "}{rO.msg}</div>}
          </div>
          <div>
            <label style={{fontSize:11,color:"#e50914",fontWeight:700,letterSpacing:1,display:"block",marginBottom:6}}>API-FOOTBALL</label>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={eFK} onChange={e=>setEFK(e.target.value)} placeholder="Cle API..." style={{flex:1,padding:"12px 14px",background:"#0a0a0a",border:"1px solid rgba(229,9,20,.3)",borderRadius:8,color:"#fff",fontSize:13}}/>
              <button onClick={testFB} disabled={!eFK.trim()||tF} style={{padding:"12px 16px",background:"rgba(229,9,20,.15)",border:"1px solid rgba(229,9,20,.3)",borderRadius:8,color:"#e50914",fontWeight:700,fontSize:12,cursor:eFK.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>{tF?"...":"Tester"}</button>
            </div>
            {rF&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:6,fontSize:11,fontWeight:600,background:rF.ok?"rgba(70,211,105,.1)":"rgba(229,9,20,.1)",color:rF.ok?"#46d369":"#e50914",border:`1px solid ${rF.ok?"rgba(70,211,105,.3)":"rgba(229,9,20,.3)"}`}}>{rF.ok?"\u2713 ":"\u2717 "}{rF.msg}</div>}
          </div>
        </ProfileCard>

        <ProfileCard title="Bankroll" icon="&#x1F4B0;">
          <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
            <div style={{flex:1}}><label style={{fontSize:11,color:"#999",display:"block",marginBottom:6}}>Capital actuel</label>
              <input type="number" value={eBR} onChange={e=>setEBR(+e.target.value)} min={0} step={0.01} style={{width:"100%",padding:"12px 14px",background:"#0a0a0a",border:"1px solid rgba(229,9,20,.3)",borderRadius:8,color:"#fff",fontSize:18,fontWeight:800}}/>
            </div>
            <div style={{textAlign:"center",padding:"12px 20px",background:"#0a0a0a",borderRadius:8,border:"1px solid #222"}}><div style={{fontSize:10,color:"#999",marginBottom:2}}>Mise max (5%)</div><div style={{fontSize:16,fontWeight:800,color:"#e50914"}}>{(eBR*.05).toFixed(2)}&#x20AC;</div></div>
          </div>
        </ProfileCard>

        <ProfileCard title="Rafraichissement" icon="&#x1F504;">
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(REFRESH_INTERVALS).map(([v,l])=>(
              <button key={v} onClick={()=>setERI(+v)} style={{padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",background:eRI===+v?"rgba(229,9,20,.2)":"#0a0a0a",border:`1px solid ${eRI===+v?"rgba(229,9,20,.4)":"#222"}`,color:eRI===+v?"#e50914":"#808080"}}>{l}</button>
            ))}
          </div>
        </ProfileCard>

        <ProfileCard title="Statut APIs" icon="&#x1F4CA;">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{padding:12,background:"#0a0a0a",borderRadius:8,border:"1px solid #222"}}><div style={{fontSize:11,color:"#999",marginBottom:4}}>The Odds API</div><div style={{fontSize:13,fontWeight:700,color:apiStatus.odds?.ok?"#46d369":config.oddsKey?"#f5c518":"#555"}}>{apiStatus.odds?.ok?`\u2713 ${apiStatus.odds.filtered} matchs`:config.oddsKey?"En attente...":"Non configuree"}</div></div>
            <div style={{padding:12,background:"#0a0a0a",borderRadius:8,border:"1px solid #222"}}><div style={{fontSize:11,color:"#999",marginBottom:4}}>API-Football</div><div style={{fontSize:13,fontWeight:700,color:apiStatus.football?.ok?"#46d369":config.footballKey?"#f5c518":"#555"}}>{apiStatus.football?.ok?"\u2713 Connectee":config.footballKey?"En attente...":"Non configuree"}</div></div>
          </div>
          {lastRefresh&&<div style={{fontSize:11,color:"#808080",marginTop:8}}>Derniere MAJ: {lastRefresh.toLocaleString("fr-FR")}</div>}
        </ProfileCard>

        <button onClick={save} style={{width:"100%",padding:16,borderRadius:12,fontWeight:700,fontSize:15,border:"none",cursor:"pointer",marginBottom:12,background:saved?"linear-gradient(135deg,#46d369,#2ea043)":"linear-gradient(135deg,#e50914,#b20710)",color:"#fff",boxShadow:"0 4px 20px rgba(229,9,20,.3)"}}>{saved?"\u2713 Sauvegarde !":"Sauvegarder"}</button>
        <button onClick={logout} style={{width:"100%",padding:12,borderRadius:10,fontWeight:600,fontSize:13,background:"none",border:"1px solid #333",color:"#808080",cursor:"pointer"}}>Reinitialiser l'application</button>
        <p style={{fontSize:10,color:"#333",textAlign:"center",marginTop:20}}>318 BETTING AGENT PRO v4.1</p>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════════
     11 — RENDER
     ═══════════════════════════════════════════════════════ */

  return(
    <div style={{minHeight:"100vh",background:"#000",color:"#fff"}}>
      <Header/>
      <Nav/>
      <Notifs/>
      {tab==="agent"&&<AgentView/>}
      {tab==="scanner"&&<ScannerView/>}
      {tab==="tracker"&&<TrackerView/>}
      {tab==="profile"&&<ProfileView/>}
      {selMatch&&<MatchModal match={selMatch} onClose={()=>setSelMatch(null)} bankroll={bankroll} onBet={placeBet}/>}
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
