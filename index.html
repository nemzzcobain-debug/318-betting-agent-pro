const calcConfidence=(homeOdds,awayOdds,drawOdds)=>{
  const ip=1/homeOdds;
  const margin=drawOdds?(1/homeOdds+1/drawOdds+1/awayOdds-1):(1/homeOdds+1/awayOdds-1);
  const tp=ip/(1+margin);
  return Math.min(99,Math.round(tp*1000)/10);
};

const kellyStake=(prob,odds,bank,edge)=>{
  /* If true value bet (edge>0), use fractional Kelly (25%) capped at 5% */
  const b=odds-1,q=1-prob;
  const k=(prob*b-q)/b;
  if(k>0)return Math.min(k*0.25*bank,bank*0.05);
  /* Near-value or high-conf: suggest conservative flat bet (1-2% of bank) */
  if(edge!==undefined&&edge>-3&&prob>0.6)return Math.round(bank*0.01*100)/100;
  return 0;
};

const DateUtils={
  toKey(d){const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`},
  toLabel(dk){
    const t=new Date();t.setHours(0,0,0,0);
    const tm=new Date(t);tm.setDate(tm.getDate()+1);
    if(DateUtils.toKey(t)===dk)return"Aujourd'hui";
    if(DateUtils.toKey(tm)===dk)return"Demain";
    return new Date(dk+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  },
  toTime(d){return new Date(d).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})},
  groupByDay(matches){
    const g={};
    matches.forEach(m=>{const k=m.commence?DateUtils.toKey(m.commence):"inconnu";if(!g[k])g[k]=[];g[k].push(m)});
    return Object.entries(g).sort(([a],[b])=>a.localeCompare(b)).map(([k,ms])=>({dateKey:k,label:DateUtils.toLabel(k),matches:ms.sort((a,b)=>new Date(a.commence||0)-new Date(b.commence||0))}));
  }
};

const fetchOdds=async(apiKey)=>{
  const results=[];
  let quotaExhausted=false;
  for(const sport of API_CONFIG.oddsApi.sports){
    if(quotaExhausted)break;
    try{
      const r=await fetch(`${API_CONFIG.oddsApi.baseUrl}/sports/${sport}/odds/?apiKey=${apiKey}&regions=eu,uk,us,au&markets=h2h&oddsFormat=decimal`);
      if(r.ok){
        const d=await r.json();
        if(d&&d.error_code==="OUT_OF_USAGE_CREDITS"){quotaExhausted=true;break;}
        if(Array.isArray(d))results.push(...d.map(g=>({...g,sportKey:sport})));
      }
      await new Promise(resolve=>setTimeout(resolve,200));
    }catch(e){console.warn(`[Odds] ${sport}:`,e.message);}
  }
  return{data:results,quotaExhausted};
};

const fetchFootballLeague=async(apiKey,leagueId)=>{
  const h={"x-apisports-key":apiKey};
  try{
    const[fx,st,inj]=await Promise.all([
      fetch(`${API_CONFIG.football.baseUrl}/fixtures?league=${leagueId}&season=${SEASON}&next=10`,{headers:h}).then(r=>r.json()),
      fetch(`${API_CONFIG.football.baseUrl}/standings?league=${leagueId}&season=${SEASON}`,{headers:h}).then(r=>r.json()),
      fetch(`${API_CONFIG.football.baseUrl}/injuries?league=${leagueId}&season=${SEASON}`,{headers:h}).then(r=>r.json()),
    ]);
    return{fixtures:fx.response||[],standings:st.response||[],injuries:inj.response||[]};
  }catch(e){console.warn(`[Football] league ${leagueId}:`,e.message);return{fixtures:[],standings:[],injuries:[]};}
};

const fetchAllFootball=async(apiKey)=>{
  const r={};
  for(const[n,id]of Object.entries(API_CONFIG.football.leagues))r[n]=await fetchFootballLeague(apiKey,id);
  return r;
};

const oddsToMatches=(oddsData)=>{
  return oddsData.map((game,i)=>{
    const info=sportKeyToName(game.sportKey);
    const bks=game.bookmakers||[];
    if(bks.length===0||!bks[0]?.markets?.[0])return null;

    /* --- Scan ALL bookmakers to find best odds per outcome --- */
    let bestHome=0,bestAway=0,bestDraw=null,bestHomeBk="",bestAwayBk="",bestDrawBk="";
    const allHome=[],allAway=[],allDraw=[];
    bks.forEach(bk=>{
      const oc=bk.markets[0]?.outcomes||[];
      const ho=oc.find(o=>o.name===game.home_team);
      const ao=oc.find(o=>o.name===game.away_team);
      const dr=oc.find(o=>o.name==="Draw");
      if(ho){allHome.push(ho.price);if(ho.price>bestHome){bestHome=ho.price;bestHomeBk=bk.title||bk.key}}
      if(ao){allAway.push(ao.price);if(ao.price>bestAway){bestAway=ao.price;bestAwayBk=bk.title||bk.key}}
      if(dr){allDraw.push(dr.price);if(!bestDraw||dr.price>bestDraw){bestDraw=dr.price;bestDrawBk=bk.title||bk.key}}
    });
    if(bestHome===0||bestAway===0)return null;

    /* --- Compute consensus (median) odds for true probability --- */
    const median=arr=>{const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2};
    const medH=median(allHome),medA=median(allAway),medD=allDraw.length>0?median(allDraw):null;

    /* --- True probability from consensus (margin-removed) --- */
    const margin=medD?(1/medH+1/medD+1/medA-1):(1/medH+1/medA-1);
    const trueProbH=(1/medH)/(1+margin),trueProbA=(1/medA)/(1+margin);

    /* --- Value = best available odds vs true probability (incl draw) --- */
    const valueH=trueProbH*bestHome-1,valueA=trueProbA*bestAway-1;
    let valueD=-999;
    let trueProbD=0;
    if(medD&&bestDraw){trueProbD=(1/medD)/(1+margin);valueD=trueProbD*bestDraw-1;}
    const vals=[{v:valueH,p:trueProbH,o:bestHome,bk:bestHomeBk,pred:`${game.home_team} Victoire`,bt:"Victoire domicile"},{v:valueA,p:trueProbA,o:bestAway,bk:bestAwayBk,pred:`${game.away_team} Victoire`,bt:"Victoire exterieur"}];
    if(medD&&bestDraw)vals.push({v:valueD,p:trueProbD,o:bestDraw,bk:bestDrawBk,pred:"Match Nul",bt:"Nul"});
    vals.sort((a,b)=>b.v-a.v);
    const best=vals[0];
    const conf=Math.min(99,Math.round(best.p*1000)/10);
    const edge=Math.round(best.v*1000)/10;

    if(conf<MIN_CONFIDENCE)return null;

    return{
      id:1000+i,...info,
      home:game.home_team,away:game.away_team,confidence:conf,
      prediction:best.pred,
      betType:best.bt,
      bestOdds:best.o,bestBk:best.bk,edge,
      isValue:edge>0,nearValue:edge>-3&&edge<=0,
      odds:bestDraw?{home:bestHome,draw:bestDraw,away:bestAway}:{home:bestHome,away:bestAway},
      homeForm:["?","?","?","?","?"],awayForm:["?","?","?","?","?"],
      h2h:"Consultez les stats pour les confrontations directes",
      tactics:{home:"Analyse tactique via API-Football",away:"Analyse tactique via API-Football"},
      injuries:{home:["Chargement..."],away:["Chargement..."]},
      pitch:"Stade officiel",weather:"Conditions actuelles",
      motivation:`${game.home_team} vs ${game.away_team}`,
      keyStats:[
        `Meilleure cote: ${best.o} (${best.bk})`,
        `Edge: ${edge>0?"+":""}${edge}%`,
        `Prob. reelle: ${conf}%`,
        `Cotes dom: ${Math.min(...allHome).toFixed(2)}-${bestHome.toFixed(2)} (${allHome.length} bk)`,
        `Cotes ext: ${Math.min(...allAway).toFixed(2)}-${bestAway.toFixed(2)} (${allAway.length} bk)`,
        bestDraw?`Cote nul: ${bestDraw.toFixed(2)} (${bestDrawBk})`:"Match sans nul",
        `${bks.length} bookmakers compares`
      ],
      xg:null,goalsAvg:null,live:true,commence:game.commence_time
    };
  }).filter(Boolean).sort((a,b)=>(b.edge||0)-(a.edge||0));
};

const enrichWithFootball=(matches,fd)=>{
  if(!fd)return matches;
  return matches.map(m=>{
    if(m.sport!=="football")return m;
    for(const[,data]of Object.entries(fd)){
      if(!data.fixtures)continue;
      for(const fix of data.fixtures){
        const hw=m.home.toLowerCase().split(" ")[0],aw=m.away.toLowerCase().split(" ")[0];
        if(fix.teams?.home?.name?.toLowerCase().includes(hw)||fix.teams?.away?.name?.toLowerCase().includes(aw)){
          const stArr=data.standings?.[0]?.league?.standings?.[0]||[];
          const hs=stArr.find(s=>s.team?.name?.toLowerCase().includes(hw));
          const as=stArr.find(s=>s.team?.name?.toLowerCase().includes(aw));
          const fm={W:"V",D:"N",L:"D"};
          const pf=r=>r?.split("").slice(-5).map(c=>fm[c]||"?")||["?","?","?","?","?"];
          const injF=w=>data.injuries?.filter(inj=>inj.team?.name?.toLowerCase().includes(w)).map(inj=>`${inj.player?.name} (${inj.player?.reason})`).slice(0,3)||[];
          const hi=injF(hw),ai=injF(aw);
          return{...m,homeForm:pf(hs?.form),awayForm:pf(as?.form),
            injuries:{home:hi.length>0?hi:["Aucune blessure signalee"],away:ai.length>0?ai:["Aucune blessure signalee"]},
            keyStats:[...m.keyStats.slice(0,2),
              hs?`${m.home}: ${hs.rank}e - ${hs.points}pts`:"",
              as?`${m.away}: ${as.rank}e - ${as.points}pts`:"",
              hs?`Bilan dom. ${m.home}: ${hs.home?.win||"?"}V-${hs.home?.draw||"?"}N-${hs.home?.lose||"?"}D`:"",
              as?`Bilan ext. ${m.away}: ${as.away?.win||"?"}V-${as.away?.draw||"?"}N-${as.away?.lose||"?"}D`:"",
            ].filter(Boolean)};
        }
      }
    }
    return m;
  });
};

const useMatches = (config) => {
  const [matches, setMatches] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [usingDemo, setUsingDemo] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const cache = DB.getCache();
      const ageMin = cache.ts ? (Date.now() - cache.ts) / 60000 : Infinity;
      if (cache.matches.length > 0 && ageMin < (config.refreshInterval || 5)) {
        setMatches(cache.matches);
        setLastRefresh(new Date(cache.ts));
        setLoading(false);
        return;
      }
      if (!config.oddsKey) {
        const demo = oddsToMatches(generateDemoData());
        setMatches(demo); setUsingDemo(true);
        DB.saveCache(demo); setLastRefresh(new Date());
      } else {
        const r = await fetchOdds(config.oddsKey);
        if (r.quotaExhausted || r.data.length === 0) {
          const demo = oddsToMatches(generateDemoData());
          setMatches(demo); setUsingDemo(true);
        } else {
          let ms = oddsToMatches(r.data);
          if (config.footballKey) {
            try { const fd = await fetchAllFootball(config.footballKey); ms = enrichWithFootball(ms, fd); } catch(e) {}
          }
          setMatches(ms); setUsingDemo(false); DB.saveCache(ms);
        }
        setLastRefresh(new Date());
      }
    } catch(e) {
      console.error("useMatches:", e);
      const cache = DB.getCache();
      if (cache.matches.length > 0) setMatches(cache.matches);
      else { const demo = oddsToMatches(generateDemoData()); setMatches(demo); setUsingDemo(true); }
    } finally { setLoading(false); }
  };

  useEffect(() => {
    load();
    const ms = (config.refreshInterval || 5) * 60 * 1000;
    const id = setInterval(load, ms);
    return () => clearInterval(id);
  }, [config.oddsKey, config.footballKey, config.refreshInterval]);

  return { matches, loading, lastRefresh, usingDemo, refresh: load };
};

      <div style={{textAlign:"center"}}><ConfBadge v={m.confidence}/></div>
      <div style={{fontSize:13,fontWeight:700,textAlign:"center"}}>{m.bestOdds.toFixed(2)}</div>
      <div style={{fontSize:12,color:m.isValue?"#46d369":m.nearValue?"#f5c518":"#666",textAlign:"center",fontWeight:600}}>{m.edge > 0 ? "+" : ""}{m.edge}%</div>
      <div style={{fontSize:13,fontWeight:700,color:stake>0?"#46d369":"#555",textAlign:"right"}}>{stake.toFixed(2)}&#x20AC;</div>
    </div>
  );
};

const AgentView = ({ config, bets, onSaveBets, onOpenProfile }) => {
  const { matches, loading, lastRefresh, usingDemo, refresh } = useMatches(config);
  const [selMatch, setSelMatch] = useState(null);

  const sorted = [...matches].sort((a,b) => b.confidence - a.confidence);
  const valueBets = sorted.filter(m => m.isValue);
  const top = sorted[0];
  const tierTop = sorted.filter(m => m.confidence >= 80);
  const tierHigh = sorted.filter(m => m.confidence >= 60 && m.confidence < 80);
  const tierMid = sorted.filter(m => m.confidence >= 40 && m.confidence < 60);

  const placeBet = (m) => {
    const stake = kellyStake(m.confidence/100, m.bestOdds, config.bankroll, m.edge);
    if (stake <= 0) { alert("Pas de mise recommandee sur ce match"); return; }
    const newBet = {
      id: Date.now(), matchId: m.id, home: m.home, away: m.away, icon: m.icon, league: m.league,
      prediction: m.prediction, odds: m.bestOdds, stake, bookmaker: m.bestBk,
      status: "pending", placedAt: new Date().toISOString()
    };
    onSaveBets([...bets, newBet]);
    setSelMatch(null);
  };

  return (
    <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:900}}>Dashboard</h1>
          <p style={{fontSize:12,color:"#888",marginTop:4}}>
            {usingDemo && <span style={{color:"#f5c518"}}>Mode demo - </span>}
            {matches.length} matchs analyses{lastRefresh && ` - MAJ ${lastRefresh.toLocaleTimeString("fr-FR")}`}
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={refresh} disabled={loading} style={{padding:"8px 16px",background:"#161616",border:"1px solid #333",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12}}>
            {loading ? "Chargement..." : "\u21BB Rafraichir"}
          </button>
          <button onClick={onOpenProfile} style={{padding:"8px 16px",background:"#161616",border:"1px solid #333",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12}}>&#9881; Parametres</button>
        </div>
      </div>

      {!config.oddsKey && <div style={{padding:16,background:"rgba(245,197,24,.1)",border:"1px solid rgba(245,197,24,.3)",borderRadius:10,marginBottom:24,fontSize:13,color:"#f5c518"}}>
        &#9888; Aucune cle API configuree. L'app utilise des donnees demo. <button onClick={onOpenProfile} style={{background:"none",border:"none",color:"#f5c518",textDecoration:"underline",cursor:"pointer",fontWeight:700}}>Configure ta cle API</button>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Total matchs" value={matches.length} color="#e50914"/>
        <StatCard label="Value bets" value={valueBets.length} color="#46d369"/>
        <StatCard label="Bankroll" value={`${config.bankroll.toFixed(2)}\u20AC`} color="#fff"/>
        <StatCard label="80%+" value={tierTop.length} color="#ff6b6b"/>
        <StatCard label="60-79%" value={tierHigh.length} color="#f5c518"/>
        <StatCard label="40-59%" value={tierMid.length} color="#4a90d9"/>
      </div>

      {top && <HeroCard match={top} bankroll={config.bankroll} onClick={() => setSelMatch(top)}/>}

      <h2 style={{fontSize:16,fontWeight:800,marginTop:24,marginBottom:12}}>Classement par confiance</h2>
      <div style={{background:"#0a0a0a",borderRadius:12,overflow:"hidden",border:"1px solid #1a1a1a"}}>
        <div style={{display:"grid",gridTemplateColumns:"40px 1fr 70px 70px 70px 80px",gap:8,padding:"10px 16px",borderBottom:"1px solid #222",fontSize:10,color:"#666",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>
          <span>#</span><span>Match</span><span style={{textAlign:"center"}}>Conf.</span><span style={{textAlign:"center"}}>Cote</span><span style={{textAlign:"center"}}>Edge</span><span style={{textAlign:"right"}}>Mise</span>
        </div>
        {sorted.slice(0, 30).map((m, i) => (
          <MatchRow key={m.id} match={m} rank={i+1} bankroll={config.bankroll} onClick={() => setSelMatch(m)}/>
        ))}
        {sorted.length === 0 && <div style={{padding:40,textAlign:"center",color:"#666"}}>Aucun match disponible</div>}
      </div>

      {selMatch && <MatchModal match={selMatch} onClose={() => setSelMatch(null)} bankroll={config.bankroll} onBet={placeBet}/>}
    </div>
  );
};

const ScannerView = ({ config, onOpenProfile }) => {
  const { matches, loading, refresh } = useMatches(config);
  const [sportFilter, setSportFilter] = useState("all");
  const [selMatch, setSelMatch] = useState(null);

  const filtered = matches
    .filter(m => sportFilter === "all" || m.sport === sportFilter)
    .sort((a,b) => (b.edge||0) - (a.edge||0));

  return (
    <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800}}>Scanner Value Bets</h1>
          <p style={{fontSize:12,color:"#888"}}>{filtered.length} opportunites</p>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[{id:"all",l:"Tous"},{id:"football",l:"\u26BD"},{id:"tennis",l:"\u{1F3BE}"},{id:"basketball",l:"\u{1F3C0}"},{id:"rugby",l:"\u{1F3C9}"}].map(f => (
            <button key={f.id} onClick={() => setSportFilter(f.id)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,background:sportFilter===f.id?"#e50914":"#161616",border:"1px solid "+(sportFilter===f.id?"#e50914":"#333"),color:"#fff",cursor:"pointer"}}>{f.l}</button>
          ))}
          <button onClick={refresh} disabled={loading} style={{padding:"6px 14px",borderRadius:8,fontSize:12,background:"#161616",border:"1px solid #333",color:"#fff",cursor:"pointer"}}>{loading ? "..." : "\u21BB"}</button>
        </div>
      </div>
      <div style={{background:"#0a0a0a",borderRadius:12,overflow:"hidden",border:"1px solid #1a1a1a"}}>
        {filtered.slice(0, 50).map((m, i) => (
          <MatchRow key={m.id} match={m} rank={i+1} bankroll={config.bankroll} onClick={() => setSelMatch(m)}/>
        ))}
        {filtered.length===0 && <div style={{padding:40,textAlign:"center",color:"#666"}}>Aucun match</div>}
      </div>
      {selMatch && <MatchModal match={selMatch} onClose={() => setSelMatch(null)} bankroll={config.bankroll} onBet={()=>setSelMatch(null)}/>}
    </div>
  );
};

const TrackerView = ({ bets }) => {
  const pending = bets.filter(b => b.status === "pending");
  const won = bets.filter(b => b.status === "won");
  const lost = bets.filter(b => b.status === "lost");
  const totalStaked = bets.reduce((s, b) => s + b.stake, 0);
  const wonStake = won.reduce((s, b) => s + b.stake, 0);
  const lostStake = lost.reduce((s, b) => s + b.stake, 0);
  const wonReturn = won.reduce((s, b) => s + b.stake * b.odds, 0);
  const pnl = wonReturn - wonStake - lostStake;
  const roi = totalStaked > 0 ? (pnl / totalStaked) * 100 : 0;
  const winRate = (won.length + lost.length) > 0 ? (won.length / (won.length + lost.length)) * 100 : 0;

  return (
    <div style={{padding:20,maxWidth:900,margin:"0 auto"}}>
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:24}}>Tracker</h1>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        <StatCard label="Paris totaux" value={bets.length} color="#fff"/>
        <StatCard label="En cours" value={pending.length} color="#f5c518"/>
        <StatCard label="Gagnes" value={won.length} color="#46d369"/>
        <StatCard label="Perdus" value={lost.length} color="#e50914"/>
        <StatCard label="Win rate" value={winRate.toFixed(1)+"%"} color={winRate>=50?"#46d369":"#e50914"}/>
        <StatCard label="PnL" value={(pnl>=0?"+":"")+pnl.toFixed(2)+"\u20AC"} color={pnl>=0?"#46d369":"#e50914"}/>
        <StatCard label="ROI" value={(roi>=0?"+":"")+roi.toFixed(1)+"%"} color={roi>=0?"#46d369":"#e50914"}/>
      </div>

      {bets.length === 0 && <div style={{padding:40,textAlign:"center",color:"#666",background:"#111",borderRadius:12}}>Aucun pari pose. Pose ton premier pari depuis le dashboard!</div>}

      {bets.slice().reverse().map(b => (
        <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:16,background:"#111",borderRadius:10,marginBottom:8,borderLeft:`3px solid ${b.status==="won"?"#46d369":b.status==="lost"?"#e50914":"#f5c518"}`}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14}}>{b.icon} {b.home} vs {b.away}</div>
            <div style={{fontSize:11,color:"#888",marginTop:4}}>{b.prediction} @ {b.odds.toFixed(2)} ({b.bookmaker}) - {new Date(b.placedAt).toLocaleDateString("fr-FR")}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <div style={{fontWeight:900,fontSize:16}}>{b.stake.toFixed(2)}&#x20AC;</div>
            <span style={{padding:"4px 10px",borderRadius:12,fontSize:10,fontWeight:700,background:b.status==="pending"?"rgba(245,197,24,.2)":b.status==="won"?"rgba(70,211,105,.2)":"rgba(229,9,20,.2)",color:b.status==="pending"?"#f5c518":b.status==="won"?"#46d369":"#e50914"}}>
              {b.status === "pending" ? "EN COURS" : b.status === "won" ? "GAGNE" : "PERDU"}
            </span>
          </div>
        </div>
      ))}
    </div>
  );
};

const ProfileView = ({ config, onSave, session, handleLogout }) => {
  const [oddsKey, setOddsKey] = useState(config.oddsKey || "");
  const [footballKey, setFootballKey] = useState(config.footballKey || "");
  const [bankroll, setBankroll] = useState(config.bankroll || 100);
  const [refreshInterval, setRefreshInterval] = useState(config.refreshInterval || 5);
  const [saved, setSaved] = useState(false);

  const save = async () => {
    await onSave({ oddsKey, footballKey, bankroll: +bankroll, refreshInterval: +refreshInterval });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div style={{padding:20,maxWidth:700,margin:"0 auto"}}>
      <h1 style={{fontSize:22,fontWeight:800,marginBottom:24}}>Parametres</h1>

      <ProfileCard title="Compte" icon="&#x1F464;">
        <div style={{fontSize:13,color:"#ccc",marginBottom:8}}>Email: <strong>{session.user.email}</strong></div>
        <div style={{fontSize:11,color:"#888"}}>Provider: {session.user.app_metadata?.provider || "email"}</div>
      </ProfileCard>

      <ProfileCard title="Cles API" icon="&#x1F511;" accent>
        <label style={{fontSize:11,color:"#999",display:"block",marginBottom:6}}>The Odds API Key</label>
        <input type="text" value={oddsKey} onChange={e=>setOddsKey(e.target.value)} placeholder="Cle the-odds-api.com" style={{width:"100%",padding:"10px 14px",background:"#0a0a0a",border:"1px solid #333",borderRadius:8,color:"#fff",fontSize:13,marginBottom:16}}/>
        <label style={{fontSize:11,color:"#999",display:"block",marginBottom:6}}>API-Football Key (optionnel)</label>
        <input type="text" value={footballKey} onChange={e=>setFootballKey(e.target.value)} placeholder="Cle api-sports.io" style={{width:"100%",padding:"10px 14px",background:"#0a0a0a",border:"1px solid #333",borderRadius:8,color:"#fff",fontSize:13}}/>
      </ProfileCard>

      <ProfileCard title="Bankroll" icon="&#x1F4B0;">
        <label style={{fontSize:11,color:"#999",display:"block",marginBottom:6}}>Capital actuel (&#x20AC;)</label>
        <input type="number" value={bankroll} onChange={e=>setBankroll(+e.target.value)} step="0.01" style={{width:"100%",padding:"10px 14px",background:"#0a0a0a",border:"1px solid #333",borderRadius:8,color:"#fff",fontSize:18,fontWeight:700}}/>
        <div style={{display:"flex",gap:12,marginTop:12}}>
          <div style={{flex:1,padding:"8px 12px",background:"#0a0a0a",borderRadius:6,fontSize:12}}><div style={{color:"#888"}}>Mise max (5%)</div><div style={{fontWeight:700,color:"#e50914"}}>{(bankroll*0.05).toFixed(2)}&#x20AC;</div></div>
          <div style={{flex:1,padding:"8px 12px",background:"#0a0a0a",borderRadius:6,fontSize:12}}><div style={{color:"#888"}}>Mise Kelly typique</div><div style={{fontWeight:700,color:"#46d369"}}>{(bankroll*0.025).toFixed(2)}&#x20AC;</div></div>
        </div>
      </ProfileCard>

      <ProfileCard title="Rafraichissement" icon="&#x1F504;">
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {Object.entries(REFRESH_INTERVALS).map(([v,l]) => (
            <button key={v} onClick={()=>setRefreshInterval(+v)} style={{padding:"8px 16px",borderRadius:8,fontSize:12,background:refreshInterval===+v?"#e50914":"#0a0a0a",border:"1px solid "+(refreshInterval===+v?"#e50914":"#333"),color:"#fff",cursor:"pointer"}}>{l}</button>
          ))}
        </div>
      </ProfileCard>

      <button onClick={save} style={{width:"100%",padding:14,borderRadius:10,fontWeight:700,fontSize:14,border:"none",cursor:"pointer",marginBottom:12,background:saved?"#46d369":"linear-gradient(135deg,#e50914,#b20710)",color:"#fff"}}>
        {saved ? "\u2713 Sauvegarde !" : "Sauvegarder"}
      </button>

      <button onClick={handleLogout} style={{width:"100%",padding:12,borderRadius:8,fontWeight:600,fontSize:13,background:"transparent",border:"1px solid #333",color:"#ff6b6b",cursor:"pointer"}}>
        Se deconnecter
      </button>

      <p style={{fontSize:10,color:"#333",textAlign:"center",marginTop:24}}>318 BETTING AGENT PRO v5.1</p>
    </div>
  );
};

const App = () => {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (authLoading) return <LoadingScreen />;
  if (!session) return <LoginScreen />;
  return <MainApp session={session} />;
};

const MainApp = ({ session }) => {
  const [config, setConfig] = useState(null);
  const [bets, setBets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("dashboard");

  useEffect(() => {
    const loadUserConfig = async () => {
      setLoading(true);
      const supabaseConfig = await DB.loadFromSupabase(session.user.id);
      const localConfig = DB.getConfig() || supabaseConfig || { oddsKey: "", footballKey: "", bankroll: 100, refreshInterval: 5 };
      setConfig(localConfig);
      setBets(DB.getBets());
      setLoading(false);
    };
    loadUserConfig();
  }, [session.user.id]);

  const saveConfig = async (newConfig) => {
    setConfig(newConfig);
    DB.saveConfig(newConfig);
    await DB.saveToSupabase(session.user.id, newConfig, bets);
  };

  const saveBets = (newBets) => {
    setBets(newBets);
    DB.saveBets(newBets);
    DB.saveToSupabase(session.user.id, config, newBets);
  };

  const handleLogout = async () => {
    await supabase.auth.signOut();
    DB.resetAll();
  };

  if (loading) return <LoadingScreen />;
  if (!config) return <LoadingScreen />;

  return(
<div style={{background:'#000',color:'#fff',minHeight:'100vh',overflow:'hidden'}}>
      <div style={{display:'flex',height:'100vh'}}>
        <div style={{width:'200px',background:'#0a0a0a',borderRight:'1px solid #222',display:'flex',flexDirection:'column',padding:'16px',overflowY:'auto'}}>
          <div style={{fontSize:'18px',fontWeight:'900',marginBottom:'24px',background:'linear-gradient(135deg,#e50914,#ff6b6b)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>318</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',flex:1}}>
            {['dashboard','agent','scanner','tracker'].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{padding:'10px',background:view===v?'#e50914':'transparent',color:'#fff',border:'none',borderRadius:'4px',cursor:'pointer',fontSize:'13px',fontWeight:view===v?'600':'400',transition:'all .3s',textAlign:'left',textTransform:'capitalize'}}>{v}</button>
            ))}
          </div>
          <button onClick={handleLogout} style={{padding:'10px',background:'transparent',color:'#ff6b6b',border:'1px solid #e50914',borderRadius:'4px',cursor:'pointer',fontSize:'12px',fontWeight:'500',transition:'all .3s',width:'100%'}}>Se deconnecter</button>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'16px',borderBottom:'1px solid #222',fontSize:'12px',color:'#888'}}>{session.user.email}</div>
          <div style={{flex:1,overflowY:'auto'}}>
            {view==='dashboard'&&<AgentView config={config} bets={bets} onSaveBets={saveBets} onOpenProfile={()=>setView('profile')}/>}
            {view==='agent'&&<AgentView config={config} bets={bets} onSaveBets={saveBets} onOpenProfile={()=>setView('profile')}/>}
            {view==='scanner'&&<ScannerView config={config} onOpenProfile={()=>setView('profile')}/>}
            {view==='tracker'&&<TrackerView bets={bets}/>}
            {view==='profile'&&<ProfileView config={config} onSave={saveConfig} session={session} handleLogout={handleLogout}/>}
          </div>
        </div>
      </div>
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
